services:
  mysql:
    image: mysql:8.0
    container_name: dt-standard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dt_standard_system}
      MYSQL_USER: ${MYSQL_USER:-standard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-standard123}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MYSQL_PASSWORD}\" mysqladmin ping -h127.0.0.1 -u\"$${MYSQL_USER}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: dt-standard-redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: dt-standard-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  onlyoffice:
    image: ${ONLYOFFICE_IMAGE:-onlyoffice/documentserver:latest}
    container_name: dt-standard-onlyoffice
    restart: unless-stopped
    environment:
      JWT_ENABLED: ${ONLYOFFICE_JWT_ENABLED:-false}
      ALLOW_PRIVATE_IP_ADDRESS: ${ONLYOFFICE_ALLOW_PRIVATE_IP_ADDRESS:-true}
    ports:
      - "127.0.0.1:${ONLYOFFICE_PORT:-8082}:80"

  backend:
    build:
      context: ../backend
    container_name: dt-standard-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - minio
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8010
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_COMMIT: ${GIT_COMMIT:-local}
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-dt_standard_system}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      MYSQL_USER: ${MYSQL_USER:-standard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-standard123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      ONLYOFFICE_ENABLED: ${ONLYOFFICE_ENABLED:-false}
      ONLYOFFICE_URL: ${ONLYOFFICE_URL:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      KNIFE4J_ENABLED: ${KNIFE4J_ENABLED:-false}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-false}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-false}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8010}:8010"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8010/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../frontend
    container_name: dt-standard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  redis-data:
  minio-data:
