services:
  mysql:
    image: mysql:8.0
    container_name: dt-standard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dt_standard_system}
      MYSQL_USER: ${MYSQL_USER:-standard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-standard123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7
    container_name: dt-standard-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: dt-standard-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ../backend
    container_name: dt-standard-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - minio
    environment:
      SERVER_PORT: 8010
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-dt_standard_system}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      MYSQL_USER: ${MYSQL_USER:-standard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-standard123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      JWT_SECRET: ${JWT_SECRET:-DatongStandardDocsJwtSecretMustBeLongEnough2026}
    ports:
      - "${BACKEND_PORT:-8010}:8010"

  frontend:
    build:
      context: ../frontend
    container_name: dt-standard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8000}:80"

volumes:
  mysql-data:
  redis-data:
  minio-data:
