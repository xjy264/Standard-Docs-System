server:
  port: ${SERVER_PORT:8010}

spring:
  application:
    name: standard-docs-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/dt_standard_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:standard}
    password: ${MYSQL_PASSWORD:standard123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:500MB}
      max-request-size: ${MAX_REQUEST_SIZE:520MB}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

captcha:
  init-default-resource: true
  secondary:
    enabled: true
    expire: 300000

knife4j:
  enable: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:DatongStandardDocsJwtSecretMustBeLongEnough2026}
    expire-seconds: ${JWT_EXPIRE_SECONDS:86400}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:standard-docs}
  office:
    onlyoffice-enabled: ${ONLYOFFICE_ENABLED:false}
    document-server-url: ${ONLYOFFICE_URL:}
  cad:
    preview-enabled: ${CAD_PREVIEW_ENABLED:false}
